version: '3.8'

services:
  # ─── App (nginx + php-fpm + reverb in one container) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: playersaloons-app:latest
    restart: unless-stopped
    environment:
      SERVICE_TYPE: web
    env_file:
      - .env
    expose:
      - "80"
    volumes:
      - storage_data:/var/www/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - playersaloons_network

  # ─── Reverb (WebSocket server) ────────────────────────────────────────────────
  reverb:
    image: playersaloons-app:latest
    restart: unless-stopped
    environment:
      SERVICE_TYPE: reverb
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - playersaloons_network

  # ─── Horizon (Queue Worker) ───────────────────────────────────────────────────
  worker:
    image: playersaloons-app:latest
    restart: unless-stopped
    environment:
      SERVICE_TYPE: worker
    env_file:
      - .env
    depends_on:
      - app
    networks:
      - playersaloons_network

  # ─── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    image: playersaloons-app:latest
    restart: unless-stopped
    environment:
      SERVICE_TYPE: scheduler
    env_file:
      - .env
    depends_on:
      - app
    networks:
      - playersaloons_network

  # ─── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playersaloons_network

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playersaloons_network

networks:
  playersaloons_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  storage_data:
