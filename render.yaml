services:
  # ─── Web (Laravel App) ───────────────────────────────────────────────────────
  - type: web
    name: playersaloons-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    healthCheckPath: /
    envVars:
      - key: SERVICE_TYPE
        value: web
      - key: APP_NAME
        value: PlayerSaloons
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://playersaloons-web.onrender.com   # update after first deploy

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: playersaloons-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: playersaloons-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: playersaloons-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: playersaloons-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playersaloons-db
          property: password

      - key: REDIS_HOST
        fromService:
          name: playersaloons-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: playersaloons-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: playersaloons-redis
          type: redis
          property: password

      - key: SESSION_DRIVER
        value: redis
      - key: SESSION_CONNECTION
        value: session
      - key: CACHE_STORE
        value: redis
      - key: REDIS_CACHE_CONNECTION
        value: cache
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_QUEUE_CONNECTION
        value: queue

      # Broadcasting disabled until Reverb is configured — change to "reverb" once ready
      - key: BROADCAST_CONNECTION
        value: log
      - key: REVERB_APP_ID
        sync: false
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REVERB_HOST
        value: playersaloons-reverb.onrender.com
      - key: REVERB_PORT
        value: 443
      - key: REVERB_SCHEME
        value: https
      - key: VITE_REVERB_APP_KEY
        sync: false
      - key: VITE_REVERB_HOST
        value: playersaloons-reverb.onrender.com
      - key: VITE_REVERB_PORT
        value: 443
      - key: VITE_REVERB_SCHEME
        value: https

      - key: FILESYSTEM_DISK
        value: public
      - key: MEDIA_DISK
        value: public

      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: PlayerSaloons

      - key: REDIS_PREFIX
        value: ""
      - key: REDIS_DEFAULT_PREFIX
        value: "ps:default:"
      - key: REDIS_CACHE_PREFIX
        value: "ps:cache:"
      - key: REDIS_SESSION_PREFIX
        value: "ps:session:"
      - key: REDIS_QUEUE_PREFIX
        value: "ps:queue:"
      - key: REDIS_REVERB_PREFIX
        value: "ps:reverb:"

  # ─── Queue Worker (Horizon) ───────────────────────────────────────────────────
  - type: worker
    name: playersaloons-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    envVars:
      - key: SERVICE_TYPE
        value: worker
      - key: APP_ENV
        value: production
      - key: APP_KEY
        fromService:
          name: playersaloons-web
          type: web
          envVarKey: APP_KEY
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: playersaloons-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: playersaloons-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: playersaloons-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: playersaloons-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playersaloons-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: playersaloons-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: playersaloons-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: playersaloons-redis
          type: redis
          property: password
      - key: QUEUE_CONNECTION
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

  # ─── Scheduler ───────────────────────────────────────────────────────────────
  - type: worker
    name: playersaloons-scheduler
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    envVars:
      - key: SERVICE_TYPE
        value: scheduler
      - key: APP_ENV
        value: production
      - key: APP_KEY
        fromService:
          name: playersaloons-web
          type: web
          envVarKey: APP_KEY
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: playersaloons-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: playersaloons-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: playersaloons-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: playersaloons-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: playersaloons-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: playersaloons-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: playersaloons-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: playersaloons-redis
          type: redis
          property: password
      - key: QUEUE_CONNECTION
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

  # ─── Reverb (WebSocket Server) ───────────────────────────────────────────────
  - type: web
    name: playersaloons-reverb
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    envVars:
      - key: SERVICE_TYPE
        value: reverb
      - key: APP_ENV
        value: production
      - key: APP_KEY
        fromService:
          name: playersaloons-web
          type: web
          envVarKey: APP_KEY
      - key: REVERB_APP_ID
        sync: false
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          name: playersaloons-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: playersaloons-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: playersaloons-redis
          type: redis
          property: password
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

databases:
  # ─── MySQL ───────────────────────────────────────────────────────────────────
  - name: playersaloons-db
    databaseName: playersaloons
    user: playersaloons
    region: singapore
    plan: starter

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - name: playersaloons-redis
    region: singapore
    plan: starter
